name: glucontrol

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-glucontrol}
      POSTGRES_USER: ${POSTGRES_USER:-glucontrol}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-glucontrol_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [glucontrol_internal]

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-glucontrol}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-glucontrol}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-glucontrol_dev_password}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-development-only-secret-change-me-123456789}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [glucontrol_internal]

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [glucontrol_internal]

networks:
  glucontrol_internal:
    driver: bridge

volumes:
  postgres_data:
