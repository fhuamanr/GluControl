spring:
  application:
    name: glucontrol-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/glucontrol}
    username: ${SPRING_DATASOURCE_USERNAME:glucontrol}
    password: ${SPRING_DATASOURCE_PASSWORD:glucontrol_dev_password}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
  flyway:
    enabled: true
  jackson:
    default-property-inclusion: non_null
server:
  port: 8080
  forward-headers-strategy: framework
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
app:
  jwt:
    secret: ${APP_JWT_SECRET:development-only-secret-change-me-123456789}
    expiration-hours: ${APP_JWT_EXPIRATION_HOURS:12}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
